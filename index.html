<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macros">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Suivi nutritionnel personnel">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">

  <title>Mes Macros</title>
</head>
<body>
  <div id="app"></div>
  <nav id="nav"></nav>
  <div id="update-toast" class="toast"></div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    const toast = document.getElementById('update-toast');
    
    // Fonction pour afficher ton toast existant
    const showUpdateToast = (msg, duration = 3000) => {
      toast.textContent = msg;
      toast.classList.add('toast-show');
      setTimeout(() => toast.classList.remove('toast-show'), duration);
    };

    let refreshing = false;
    // Détecte le moment où la v7 prend le contrôle
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        window.location.reload();
        refreshing = true;
      }
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // Force la vérification au démarrage
        reg.update();

        reg.onupdatefound = () => {
          const worker = reg.installing;
          worker.onstatechange = () => {
            switch (worker.state) {
              case 'installing':
                // Étape 1 : Le SW est en train de télécharger les fichiers
                showUpdateToast("✨ Mise à jour détectée...");
                break;
              case 'installed':
                if (navigator.serviceWorker.controller) {
                  // Étape 2 : Le SW est prêt, il va bientôt trigger le reload
                  showUpdateToast("✅ Version prête, installation...", 4000);
                }
                break;
            }
          };
        };
      });
    });
  }
</script>
</body>
</html>
