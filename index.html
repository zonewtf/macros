<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macros">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Suivi nutritionnel personnel">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">

  <title>Mes Macros</title>
</head>
<body>
  <div id="app"></div>
  <nav id="nav"></nav>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    let refreshing = false;

    // Détecte quand le nouveau SW prend le contrôle et rafraîchit la page
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        window.location.reload();
        refreshing = true;
      }
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          // Vérifie s'il y a une MAJ au lancement
          reg.update();
        })
        .catch(err => console.warn('SW Erreur:', err));
    });
  }
</script>
</body>
</html>
